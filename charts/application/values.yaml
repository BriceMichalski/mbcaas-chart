default:
  probe: {}
  replicaCount: 1
  strategy: Recreate
  # maxSurge: 25%      # RollingUpdate only
  # maxUnavailable: 25% # RollingUpdate only
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 80
  cronjob:
